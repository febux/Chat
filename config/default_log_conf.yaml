version: 1
disable_existing_loggers: False
formatters:
  default:
    # "()": uvicorn.logging.DefaultFormatter
    format: '{"level": "%(levelname)s", "message": "%(message)s", "timestamp": "%(asctime)s", "module": "%(name)s"}'
  access:
    # "()": uvicorn.logging.AccessFormatter
    format: '{"level": "%(levelname)s", "message": "%(message)s", "timestamp": "%(asctime)s", "module": "%(name)s"}'
handlers:
  default:
    formatter: default
    class: logging.StreamHandler
    stream: ext://sys.stderr
  access:
    formatter: access
    class: logging.StreamHandler
    stream: ext://sys.stdout
loggers:
  uvicorn.error:
    level: INFO
    handlers:
      - default
    propagate: yes
  uvicorn.access:
    level: INFO
    handlers:
      - access
    propagate: yes
  gunicorn.error:
    level: INFO
    handlers:
      - default
    propagate: yes
  gunicorn.access:
    level: INFO
    handlers:
      - access
    propagate: yes
root:
  level: INFO
  handlers:
    - default
  propagate: yes