global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'fastapi'
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ['api:10000']

  - job_name: "base-api-otel-collector"
    static_configs:
      - targets: [ "otel-collector:8889" ]