<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация / Регистрация</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='/css/auth.css') }}">
</head>
<body>
    <div class="auth-container">
        <!-- Табы -->
        <div class="tabs">
            <div class="tab active" data-tab="login">Авторизация</div>
            <div class="tab" data-tab="register">Регистрация</div>
        </div>

        <!-- Форма авторизации -->
        <div id="login" class="form-container active">
            <div id="login-message"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Пароль</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn">Войти</button>
            </form>
        </div>

        <!-- Форма регистрации -->
        <div id="register" class="form-container">
            <div id="register-message"></div>
            <form id="register-form">
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" required>
                </div>
                <div class="form-group">
                    <label for="register-name">Имя</label>
                    <input type="text" id="register-name" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Пароль</label>
                    <input type="password" id="register-password" required minlength="8">
                </div>
                <div class="form-group">
                    <label for="register-password-check">Повторите пароль</label>
                    <input type="password" id="register-password-check" required minlength="8">
                </div>
                <button type="submit" class="btn">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='/js/auth.js') }}"></script>
</body>
</html>
